<text x="336.0" y="258" text-anchor="middle" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="22" fill="#111111"><tspan x="336.0" dy="0">생일이 21일이라면 - 21이 적힌 카드는 A·C·E뿐이라 그 셋을 고르게 된다</tspan></text>
<text x="336.0" y="306" text-anchor="middle" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="22" fill="#111111"><tspan x="336.0" dy="0">마술사의 계산: 고른 카드의 첫 수 합 = 1 + 4 + 16 = 21 - 즉석에서 맞힌다!</tspan></text>
