<text x="300" y="78" text-anchor="middle" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="22" fill="#111111"><tspan x="300" dy="0">대답은 셋 중 하나 — 왼쪽 가벼움 · 균형 · 오른쪽 가벼움</tspan></text>
<text x="420" y="268" text-anchor="middle" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="21" fill="#111111"><tspan x="420" dy="0">한 번의 저울질이 후보를 셋으로 가른다 → 9 → 3 → 1, 두 계단이면 끝</tspan><tspan x="420" dy="26">1번이 안 되는 이유: 대답 3가지 < 후보 9개</tspan></text>
