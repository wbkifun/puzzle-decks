<text x="704" y="156" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="23" fill="#111111">= 16+4+1 = 21</text>
<text x="704" y="216" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="23" fill="#111111">= 10101₂</text>
<text x="470" y="282" text-anchor="middle" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="21" fill="#111111"><tspan x="470" dy="0">이름표(고른다/안 고른다) = 분해표 = 이진법 표기 - 다섯 글자의 가짓수는 2⁵ = 32 ≥ 31</tspan><tspan x="470" dy="26">1~100 판은 카드 7장(1·2·4·8·16·32·64): 2⁷ = 128 ≥ 100 - 스무고개가 7번인 것과 같은 이유</tspan></text>
</svg>
