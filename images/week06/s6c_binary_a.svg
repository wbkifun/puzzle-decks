<text x="130" y="156" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="21" font-weight="700" fill="#111111">고른다?</text>
<text x="130" y="216" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="21" font-weight="700" fill="#111111">이진법</text>
<text x="250" y="66" text-anchor="middle" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="28" font-weight="800" fill="#111111">E</text>
