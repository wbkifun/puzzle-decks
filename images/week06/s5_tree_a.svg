<text x="515" y="354" text-anchor="middle" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="22" fill="#111111"><tspan x="515" dy="0">세 계단이면 끝 - 저울 n번은 후보 3ⁿ개까지 (3의 사다리: 3 · 9 · 27)</tspan><tspan x="515" dy="27">2번의 기록은 3² = 9가지뿐 < 후보 27개 → 2번으론 절대 안 된다</tspan></text>
