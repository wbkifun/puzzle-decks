<polygon points="224,205.0 211,198.5 211,211.5" fill="#111111"/>
<text x="192.0" y="193.0" text-anchor="middle" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="17" fill="#111111">−짝수</text>
<rect x="232" y="168" width="96" height="74" rx="9" fill="none" stroke="#111111" stroke-width="2.8"/>
<text x="280.0" y="213.0" text-anchor="middle" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="23" fill="#111111">홀수</text>
<line x1="336" y1="205.0" x2="390" y2="205.0" stroke="#111111" stroke-width="3"/>
<polygon points="400,205.0 387,198.5 387,211.5" fill="#111111"/>
<text x="368.0" y="193.0" text-anchor="middle" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="17" fill="#111111">−짝수</text>
<rect x="408" y="168" width="96" height="74" rx="9" fill="none" stroke="#111111" stroke-width="2.8"/>
<text x="456.0" y="213.0" text-anchor="middle" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="23" fill="#111111">홀수</text>
<text x="536" y="213.0" text-anchor="middle" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="26" fill="#111111">⋯</text>
