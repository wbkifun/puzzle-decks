<text x="689.0" y="223.0" text-anchor="middle" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="19" fill="#111111">반드시 홀수</text>
<text x="394" y="330" text-anchor="middle" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="21" fill="#111111"><tspan x="394" dy="0">아홉 번을 지나도 홀짝은 그대로 — 0(짝수)은 절대 될 수 없다</tspan><tspan x="394" dy="26">(1은 짝지어 빼기로 실제로 만들 수 있다 — 다음 장)</tspan></text>
</svg>
