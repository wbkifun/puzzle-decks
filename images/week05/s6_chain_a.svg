<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 790 396" width="790" height="396">
<text x="330" y="74" text-anchor="middle" font-family="Pretendard, 'NanumSquareRound', sans-serif" font-size="23" fill="#111111"><tspan x="330" dy="0">지우기 전 a + b,  적은 후 a − b  —  차이는 (a+b) − (a−b) = 2b</tspan><tspan x="330" dy="28">→ 합은 언제나 ‘짝수만큼’ 줄어든다</tspan></text>
<rect x="24" y="168" width="128" height="74" rx="9" fill="none" stroke="#111111" stroke-width="2.8"/>
